name: Deploy Smoke Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  deploy-smoke:
    name: Post-deploy smoke validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build site
        working-directory: frontend
        run: npm run build

      - name: Run deploy smoke checks
        working-directory: frontend
        run: npm run deploy-smoke
