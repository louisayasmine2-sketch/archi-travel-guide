<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Siena skyline and cathedral illustration</title>
  <desc id="desc">A warm illustrated skyline inspired by Siena, Tuscany, with cathedral forms and rolling hills.</desc>
  <defs>
